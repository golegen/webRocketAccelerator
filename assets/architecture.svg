<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
  </defs>
  <style>
    .box { rx:8; ry:8; stroke-width:2; }
    .diamond { stroke-width:2; }
    .text { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:13px; fill:#333; text-anchor:middle; }
    .text-sm { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:11px; fill:#666; text-anchor:middle; }
    .text-zh { font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif; font-size:11px; fill:#888; text-anchor:middle; }
    .label { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:11px; fill:#555; }
  </style>

  <!-- Title -->
  <text x="400" y="28" class="text" font-size="16" font-weight="700" fill="#3d352c">System Flow / 系统流程</text>

  <!-- Node: User Interaction -->
  <rect x="300" y="50" width="200" height="50" class="box" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="400" y="72" class="text" font-weight="600">🖱️ User Interaction</text>
  <text x="400" y="90" class="text-zh">用户交互</text>

  <!-- Arrow: A -> B -->
  <line x1="400" y1="100" x2="400" y2="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node: isOk Gate (diamond) -->
  <polygon points="400,140 520,190 400,240 280,190" class="diamond" fill="#fff3e0" stroke="#e65100"/>
  <text x="400" y="185" class="text" font-weight="600">isOk() Gate</text>
  <text x="400" y="200" class="text-zh">过滤检查</text>

  <!-- Arrow: B -> Pass (right) -->
  <line x1="520" y1="190" x2="590" y2="190" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="555" y="183" class="label" fill="#2e7d32">✅ Pass</text>

  <!-- Arrow: B -> Block (left) -->
  <line x1="280" y1="190" x2="210" y2="190" stroke="#c62828" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="245" y="183" class="label" fill="#c62828">❌ Block</text>

  <!-- Node: Skip (left) -->
  <rect x="60" y="165" width="150" height="50" class="box" fill="#fce4ec" stroke="#c62828"/>
  <text x="135" y="187" class="text" font-weight="600">🚫 Skip Prefetch</text>
  <text x="135" y="205" class="text-zh">跳过预取</text>

  <!-- Node: Cache Tier (right) -->
  <polygon points="590,140 710,190 590,240 470,190" class="diamond" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="590" y="185" class="text" font-weight="600">Cache Tier</text>
  <text x="590" y="200" class="text-zh">缓存层级</text>

  <!-- Arrow: Cache -> T0_COLD (down-right) -->
  <line x1="710" y1="190" x2="750" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="730" y="183" class="label">T0_COLD</text>

  <!-- Arrow: Cache -> T1_WARM (down) -->
  <line x1="590" y1="240" x2="590" y2="275" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="260" class="label">T1_WARM</text>

  <!-- Arrow: Cache -> T2_STALE (down-left) -->
  <line x1="470" y1="190" x2="430" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="183" class="label">T2_STALE</text>

  <!-- Node: CDN Mirror (right) -->
  <rect x="750" y="165" width="150" height="50" class="box" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="825" y="187" class="text" font-weight="600">🌐 CDN Mirror</text>
  <text x="825" y="205" class="text-zh">CDN镜像加速</text>

  <!-- Node: Skip Rewrite (below Cache) -->
  <rect x="515" y="280" width="150" height="50" class="box" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="590" y="302" class="text" font-weight="600">💾 Skip Rewrite</text>
  <text x="590" y="320" class="text-zh">跳过重写</text>

  <!-- Node: Re-accelerate (left of Cache) -->
  <rect x="355" y="165" width="75" height="50" class="box" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="392" y="187" class="text-sm" font-weight="600">🔄</text>
  <text x="392" y="202" class="text-sm">Re-accel</text>

  <!-- Arrow: CDN Mirror -> Prefetch Tag -->
  <line x1="825" y1="215" x2="590" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Re-accel -> Prefetch Tag -->
  <line x1="392" y1="215" x2="590" y2="330" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Skip Rewrite -> Stats -->
  <line x1="590" y1="330" x2="590" y2="365" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node: Prefetch Tag -->
  <rect x="490" y="370" width="200" height="50" class="box" fill="#fff8e1" stroke="#f57f17"/>
  <text x="590" y="392" class="text" font-weight="600">📦 Prefetch Tag</text>
  <text x="590" y="410" class="text-zh">预取标签注入</text>

  <!-- Arrow: Prefetch -> Browser Cache -->
  <line x1="490" y1="395" x2="400" y2="395" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Prefetch -> Stats -->
  <line x1="690" y1="395" x2="760" y2="395" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node: Browser Cache -->
  <rect x="250" y="370" width="150" height="50" class="box" fill="#e0f2f1" stroke="#00695c"/>
  <text x="325" y="392" class="text" font-weight="600">⚡ Browser Cache</text>
  <text x="325" y="410" class="text-zh">浏览器缓存</text>

  <!-- Node: Stats (right) -->
  <rect x="760" y="370" width="100" height="50" class="box" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="810" y="392" class="text-sm" font-weight="600">📊 Stats</text>
  <text x="810" y="410" class="text-zh">统计更新</text>

  <!-- Legend -->
  <rect x="30" y="450" width="740" height="150" rx="8" fill="#faf7f2" stroke="#e3dbcf" stroke-width="1"/>
  <text x="400" y="475" class="text" font-size="14" font-weight="700" fill="#3d352c">Legend / 图例</text>

  <rect x="50" y="490" width="14" height="14" rx="3" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="70" y="502" class="label" font-size="11">Event / 事件触发</text>

  <rect x="200" y="490" width="14" height="14" rx="3" fill="#fff3e0" stroke="#e65100"/>
  <text x="220" y="502" class="label" font-size="11">Gate / 过滤检查</text>

  <rect x="370" y="490" width="14" height="14" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="390" y="502" class="label" font-size="11">Cache / 缓存决策</text>

  <rect x="540" y="490" width="14" height="14" rx="3" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="560" y="502" class="label" font-size="11">CDN / 镜像加速</text>

  <rect x="50" y="515" width="14" height="14" rx="3" fill="#fce4ec" stroke="#c62828"/>
  <text x="70" y="527" class="label" font-size="11">Skip / 跳过</text>

  <rect x="200" y="515" width="14" height="14" rx="3" fill="#fff8e1" stroke="#f57f17"/>
  <text x="220" y="527" class="label" font-size="11">Action / 执行动作</text>

  <rect x="370" y="515" width="14" height="14" rx="3" fill="#e0f2f1" stroke="#00695c"/>
  <text x="390" y="527" class="label" font-size="11">Result / 结果</text>

  <rect x="540" y="515" width="14" height="14" rx="3" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="560" y="527" class="label" font-size="11">Stats / 统计</text>
</svg>